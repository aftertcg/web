<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Editor After TCG</title><style>body{font-family:system-ui;background:#0b0d12;color:#fff;margin:0;padding:18px}main{max-width:760px;margin:auto}textarea{width:100%;min-height:55vh;background:#151922;color:#f5f5f5;border:1px solid #d8a53a;border-radius:12px;padding:12px;font-family:monospace}button{padding:13px 16px;border:0;border-radius:10px;background:#d8a53a;font-weight:800;margin:8px 5px 0 0}.note{color:#aaa}</style></head><body><main><h1>Editor rápido de eventos</h1><p class="note">Editá el contenido y descargá un nuevo archivo <b>eventos.js</b>. Después reemplazalo dentro de la carpeta EDITAR-ACA.</p><textarea id="txt"></textarea><br><button id="download">Descargar eventos.js</button><button id="reset">Restaurar ejemplo</button></main><script src="EDITAR-ACA/eventos.js"></script><script>const t=document.getElementById("txt");function render(){t.value="window.AFTER_EVENTOS = "+JSON.stringify(window.AFTER_EVENTOS,null,2)+";\n"}render();document.getElementById("download").onclick=()=>{const b=new Blob([t.value],{type:"text/javascript"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="eventos.js";a.click();URL.revokeObjectURL(a.href)};document.getElementById("reset").onclick=render;</script></body></html>
