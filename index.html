<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080a0f">
  <meta name="description" content="After TCG es un espacio de eventos TCG, Nintendo Switch, comunidad, snacks y actividades con reserva en Almagro, CABA.">
  <meta property="og:title" content="After TCG">
  <meta property="og:description" content="Cartas, torneos, Switch y comunidad. Reservá tu lugar.">
  <meta property="og:image" content="assets/eventos/torneo-standard.jpg">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="After TCG">
  <meta property="og:title" content="After TCG | Jugá, compartí y viví el hobby">
  <meta property="og:description" content="Eventos TCG, Nintendo Switch, comunidad y actividades con reserva en Almagro, CABA.">
  <meta property="og:image" content="assets/eventos/torneo-standard.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="After TCG">
  <meta name="twitter:description" content="Eventos, gaming y comunidad en Almagro.">
  <meta name="twitter:image" content="assets/eventos/torneo-standard.jpg">
  <title>After TCG | Eventos, comunidad y gaming en Almagro</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/branding/icon-192.png">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar premium-topbar">

      <button
        class="topbar-brand"
        data-route="inicio"
        aria-label="Ir al inicio"
      >
        <span>AFTER</span>
        <strong>TCG</strong>
      </button>

      <div class="topbar-live" id="topbar-live">
        <span class="topbar-live-dot"></span>

        <div>
          <strong id="topbar-live-title">
            Próxima actividad
          </strong>

          <small id="topbar-live-detail">
            Almagro, CABA
          </small>
        </div>
      </div>

    </header>
    <main id="app" class="app-main" aria-live="polite"></main>
    <nav class="bottom-nav premium-nav" aria-label="Navegación principal">

      <button class="nav-btn" data-route="noticias">
        <span class="nav-emoji">🗞️</span>
        <span>Noticias</span>
      </button>

      <button class="nav-btn" data-route="eventos">
        <span class="nav-emoji">📅</span>
        <span>Eventos</span>
      </button>

      <button class="nav-btn is-active" data-route="inicio">
        <span class="nav-emoji">🏠</span>
        <span>Inicio</span>
      </button>

      <button class="nav-btn" data-route="comunidad">
        <span class="nav-emoji">👥</span>
        <span>Comunidad</span>
      </button>

      <button class="nav-btn" data-route="contacto">
        <span class="nav-emoji">📍</span>
        <span>Visítanos</span>
      </button>

    </nav>
  </div>
  <dialog id="event-modal" class="event-modal"><button class="modal-close" aria-label="Cerrar">×</button><div id="modal-content"></div></dialog>
  <script src="EDITAR-ACA/config.js"></script>
  <script src="EDITAR-ACA/eventos.js"></script>
  <script src="EDITAR-ACA/comunidad.js"></script>
  <script src="EDITAR-ACA/noticias.js"></script>
  <script src="EDITAR-ACA/rankings.js"></script>
  <script src="EDITAR-ACA/resultados.js"></script>
  <script src="EDITAR-ACA/galeria.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/modules/noticias.js"></script>
  <script src="js/modules/inicio.js"></script>
  <script src="js/modules/eventos.js"></script>
  <script src="js/modules/calendario.js"></script>
  <script src="js/modules/comunidad.js"></script>
  <script src="js/modules/contacto.js"></script>
  <script src="js/core/ui.js"></script>
  <script src="js/core/app.js"></script>
</body>
</html>
